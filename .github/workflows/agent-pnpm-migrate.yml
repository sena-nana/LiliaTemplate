name: One-shot pnpm migration

on:
  push:
    branches:
      - agent/migrate-pnpm-workflow
    paths:
      - .github/workflows/agent-pnpm-migrate.yml

permissions:
  contents: write

jobs:
  migrate:
    if: github.ref == 'refs/heads/agent/migrate-pnpm-workflow'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.14.0

      - name: Set up Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Rewrite Yarn configuration and commands
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import {
            existsSync,
            mkdirSync,
            readFileSync,
            readdirSync,
            renameSync,
            rmSync,
            statSync,
            writeFileSync,
          } from 'node:fs';
          import { basename, dirname, extname, join, relative } from 'node:path';

          const repositoryRoot = process.cwd();
          const packageManager = 'pnpm@11.14.0';
          const ignoredDirectories = new Set([
            '.git', '.idea', '.vscode', 'node_modules', 'target', 'dist', 'build',
            'coverage', '.turbo', '.vite', '.cache', '.venv', 'vendor',
          ]);
          const textExtensions = new Set([
            '.cjs', '.css', '.html', '.js', '.json', '.json5', '.jsx', '.md', '.mdx',
            '.mjs', '.sh', '.toml', '.ts', '.tsx', '.vue', '.yaml', '.yml',
          ]);
          const textBasenames = new Set([
            '.gitignore', '.npmrc', 'AGENTS.md', 'Dockerfile', 'Makefile', 'README',
          ]);
          const workspaceSettings = new Map();

          function walk(directory) {
            const files = [];
            for (const entry of readdirSync(directory, { withFileTypes: true })) {
              if (entry.isDirectory() && ignoredDirectories.has(entry.name)) continue;
              const path = join(directory, entry.name);
              if (entry.isDirectory()) files.push(...walk(path));
              else if (entry.isFile()) files.push(path);
            }
            return files;
          }

          function migrateCommand(command) {
            return command
              .replace(/\byarn\s+--cwd\s+([^\s]+)\s+/g, 'pnpm --dir $1 ')
              .replace(/\byarn\s+workspaces\s+foreach\s+-Ap\s+run\s+([\w:-]+)/g, 'pnpm -r --parallel --if-present run $1')
              .replace(/\byarn\s+workspace\s+([^\s]+)\s+/g, 'pnpm --filter $1 ')
              .replace(/\bcorepack\s+yarn\s+install\s+--immutable\b/g, 'pnpm install --frozen-lockfile')
              .replace(/\byarn\s+install\s+--immutable(?:-cache)?\b/g, 'pnpm install --frozen-lockfile')
              .replace(/\byarn\s+install\b/g, 'pnpm install')
              .replace(/\byarn\s+node\s+/g, 'node ')
              .replace(/\byarn\s+dlx\b/g, 'pnpm dlx')
              .replace(/\byarn\s+exec\b/g, 'pnpm exec')
              .replace(/\byarn\s+npm\s+audit\b/g, 'pnpm audit')
              .replace(/\byarn\s+run\s+/g, 'pnpm run ')
              .replace(/\byarn\s+/g, 'pnpm ');
          }

          function migrateGitDependency(specifier) {
            if (typeof specifier !== 'string') return specifier;
            const match = /^(github:[^#]+)#workspace=([^&]+)&commit=([0-9a-f]{40})$/i.exec(specifier);
            if (!match) return specifier;
            const packageName = decodeURIComponent(match[2]);
            const packageDirectory = packageName.split('/').at(-1);
            return `${match[1]}#${match[3]}&path:/packages/${packageDirectory}`;
          }

          function normalizeResolutionKey(key) {
            return key.replace(/@npm:/g, '@');
          }

          function normalizeResolutionValue(value) {
            return typeof value === 'string' ? value.replace(/^npm:(?=\d)/, '') : value;
          }

          function migrateManifest(path) {
            const manifest = JSON.parse(readFileSync(path, 'utf8'));
            let changed = false;

            if (typeof manifest.packageManager === 'string' && manifest.packageManager.startsWith('yarn@')) {
              manifest.packageManager = packageManager;
              changed = true;
              manifest.engines ??= {};
              if (manifest.engines.pnpm !== '>=11.0.0 <12') {
                manifest.engines.pnpm = '>=11.0.0 <12';
              }
            }

            for (const field of ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies']) {
              if (!manifest[field]) continue;
              for (const [name, specifier] of Object.entries(manifest[field])) {
                const migrated = migrateGitDependency(specifier);
                if (migrated !== specifier) {
                  manifest[field][name] = migrated;
                  changed = true;
                }
              }
            }

            if (manifest.scripts) {
              for (const [name, command] of Object.entries(manifest.scripts)) {
                if (typeof command !== 'string') continue;
                const migrated = migrateCommand(command);
                if (migrated !== command) {
                  manifest.scripts[name] = migrated;
                  changed = true;
                }
              }
            }

            const workspaces = Array.isArray(manifest.workspaces)
              ? manifest.workspaces
              : Array.isArray(manifest.workspaces?.packages)
                ? manifest.workspaces.packages
                : [];
            const settings = workspaceSettings.get(dirname(path)) ?? { packages: [], overrides: {} };
            if (workspaces.length) settings.packages = [...new Set([...settings.packages, ...workspaces])];

            if (manifest.resolutions && typeof manifest.resolutions === 'object') {
              for (const [key, value] of Object.entries(manifest.resolutions)) {
                settings.overrides[normalizeResolutionKey(key)] = normalizeResolutionValue(value);
              }
              delete manifest.resolutions;
              changed = true;
            }
            workspaceSettings.set(dirname(path), settings);

            if (changed) writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
          }

          function yamlString(value) {
            return JSON.stringify(String(value));
          }

          function writeWorkspaceSettings(directory, settings) {
            if (!settings.packages.length && !Object.keys(settings.overrides).length) return;
            const path = join(directory, 'pnpm-workspace.yaml');
            if (existsSync(path)) return;
            const lines = [];
            if (settings.packages.length) {
              lines.push('packages:');
              for (const pattern of settings.packages) lines.push(`  - ${yamlString(pattern)}`);
            }
            if (Object.keys(settings.overrides).length) {
              if (lines.length) lines.push('');
              lines.push('overrides:');
              for (const [key, value] of Object.entries(settings.overrides)) {
                lines.push(`  ${yamlString(key)}: ${yamlString(value)}`);
              }
            }
            writeFileSync(path, `${lines.join('\n')}\n`);
          }

          function removeNamedWorkflowSteps(source) {
            const lines = source.split('\n');
            const output = [];
            for (let index = 0; index < lines.length;) {
              const match = /^(\s*)-\s+name:\s*(.+?)\s*$/.exec(lines[index]);
              if (!match || !/corepack/i.test(match[2])) {
                output.push(lines[index]);
                index += 1;
                continue;
              }
              const indentation = match[1];
              index += 1;
              while (index < lines.length && !new RegExp(`^${indentation.replace(/ /g, ' ')}-\\s+`).test(lines[index])) {
                index += 1;
              }
            }
            return output.join('\n');
          }

          function injectPnpmSetup(source) {
            if (source.includes('pnpm/action-setup@')) return source;
            const directStep = /^(\s*)-\s+uses:\s+actions\/setup-node@([^\n]+)$/m;
            if (directStep.test(source)) {
              return source.replace(directStep, (_, indent, version) =>
                `${indent}- name: Set up pnpm\n${indent}  uses: pnpm/action-setup@v4\n${indent}  with:\n${indent}    version: 11.14.0\n\n${indent}- uses: actions/setup-node@${version}`,
              );
            }
            const namedStep = /^(\s*)-\s+name:\s+([^\n]*Node[^\n]*)\n(\s*)uses:\s+actions\/setup-node@([^\n]+)$/mi;
            if (namedStep.test(source)) {
              return source.replace(namedStep, (_, indent, name, usesIndent, version) =>
                `${indent}- name: Set up pnpm\n${indent}  uses: pnpm/action-setup@v4\n${indent}  with:\n${indent}    version: 11.14.0\n\n${indent}- name: ${name}\n${usesIndent}uses: actions/setup-node@${version}`,
              );
            }
            return source;
          }

          const allFiles = walk(repositoryRoot);
          for (const path of allFiles.filter((file) => basename(file) === 'package.json')) {
            migrateManifest(path);
          }
          for (const [directory, settings] of workspaceSettings) writeWorkspaceSettings(directory, settings);

          const oldActionDirectory = join(repositoryRoot, '.github/actions/setup-node-yarn');
          const newActionDirectory = join(repositoryRoot, '.github/actions/setup-node-pnpm');
          if (existsSync(oldActionDirectory) && !existsSync(newActionDirectory)) {
            mkdirSync(dirname(newActionDirectory), { recursive: true });
            renameSync(oldActionDirectory, newActionDirectory);
          }
          if (existsSync(newActionDirectory)) {
            writeFileSync(join(newActionDirectory, 'action.yml'), `name: Setup Node and pnpm\ndescription: Install the repository Node baseline and pinned pnpm\n\ninputs:\n  working-directory:\n    description: Directory containing package.json and pnpm-lock.yaml\n    default: .\n\nruns:\n  using: composite\n  steps:\n    - name: Set up pnpm\n      uses: pnpm/action-setup@v4\n      with:\n        version: 11.14.0\n\n    - name: Set up Node.js\n      uses: actions/setup-node@v6\n      with:\n        node-version-file: \${{ inputs.working-directory }}/.node-version\n        cache: pnpm\n        cache-dependency-path: \${{ inputs.working-directory }}/pnpm-lock.yaml\n\n    - name: Enable the Node compile cache\n      shell: bash\n      run: |\n        echo "NODE_COMPILE_CACHE=\${RUNNER_TEMP}/node-compile-cache" >> "\${GITHUB_ENV}"\n        echo "NODE_COMPILE_CACHE_PORTABLE=1" >> "\${GITHUB_ENV}"\n\n    - name: Install dependencies\n      shell: bash\n      working-directory: \${{ inputs.working-directory }}\n      env:\n        NODE_COMPILE_CACHE: \${{ runner.temp }}/node-compile-cache\n        NODE_COMPILE_CACHE_PORTABLE: "1"\n      run: pnpm install --frozen-lockfile\n`);
          }

          for (const path of walk(repositoryRoot)) {
            const fileName = basename(path);
            if (fileName === 'package.json' || fileName === 'yarn.lock' || fileName === 'pnpm-lock.yaml') continue;
            const extension = extname(path).toLowerCase();
            if (!textExtensions.has(extension) && !textBasenames.has(fileName)) continue;
            if (statSync(path).size > 1_000_000) continue;

            let source = readFileSync(path, 'utf8');
            let migrated = source
              .replaceAll('yarn.lock', 'pnpm-lock.yaml')
              .replaceAll('setup-node-yarn', 'setup-node-pnpm')
              .replaceAll('requiredYarnVersion', 'requiredPnpmVersion')
              .replaceAll('yarnMatch', 'pnpmMatch')
              .replaceAll('yarnVersion', 'pnpmVersion')
              .replaceAll('yarnMajor', 'pnpmMajor')
              .replaceAll('\\byarn\\/', '\\bpnpm\\/')
              .replace(/\bpnpmMajor\s*>=\s*4\b/g, 'pnpmMajor >= 11');
            migrated = migrateCommand(migrated)
              .replace(/\bYarn\b/g, 'pnpm')
              .replace(/\byarn\b/g, 'pnpm')
              .replace(/cache:\s*pnpm\b/g, 'cache: pnpm');

            if (/\.github\/workflows\//.test(relative(repositoryRoot, path).replaceAll('\\', '/'))) {
              migrated = injectPnpmSetup(removeNamedWorkflowSteps(migrated));
            }
            if (migrated !== source) writeFileSync(path, migrated);
          }

          for (const path of walk(repositoryRoot).filter((file) => basename(file) === '.gitignore')) {
            const source = readFileSync(path, 'utf8');
            const lines = source.split('\n').filter((line) =>
              !/^\s*\.yarn(?:\/|$)/.test(line) &&
              !/^\s*\.pnp(?:\.|$)/.test(line) &&
              !/^\s*yarn-(?:error|debug)\.log/.test(line),
            );
            if (!lines.some((line) => line.trim() === 'pnpm-debug.log*')) lines.push('pnpm-debug.log*');
            writeFileSync(path, `${lines.filter((line, index, array) => index < array.length - 1 || line !== '').join('\n')}\n`);
          }

          rmSync(join(repositoryRoot, '.yarn'), { recursive: true, force: true });
          rmSync(join(repositoryRoot, '.yarnrc.yml'), { force: true });
          rmSync(join(repositoryRoot, '.pnp.cjs'), { force: true });
          rmSync(join(repositoryRoot, '.pnp.js'), { force: true });
          NODE

      - name: Generate pnpm lockfiles
        shell: bash
        run: |
          mapfile -t yarn_locks < <(find . -type f -name yarn.lock -not -path './.git/*' | sort)
          for lockfile in "${yarn_locks[@]}"; do
            directory="$(dirname "${lockfile}")"
            if [[ -f "${directory}/package.json" ]]; then
              (
                cd "${directory}"
                pnpm import || true
                pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts
              )
            fi
          done

          find . -type f -name yarn.lock -not -path './.git/*' -delete
          find . -type f -name .yarnrc.yml -not -path './.git/*' -delete
          find . -type f \( -name .pnp.cjs -o -name .pnp.js \) -not -path './.git/*' -delete
          find . -type d -name .yarn -not -path './.git/*' -prune -exec rm -rf {} +

          pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Commit migrated workflow
        shell: bash
        run: |
          rm -f .github/workflows/agent-pnpm-migrate.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No migration changes were produced."
            exit 1
          fi
          git commit -m "chore: migrate workflow from yarn to pnpm"
          git push origin HEAD
