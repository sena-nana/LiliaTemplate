name: One-shot pnpm migration

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/migrate-pnpm-workflow'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.14.0

      - name: Set up Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Rewrite Yarn configuration and commands
        run: node .github/scripts/migrate-pnpm.mjs

      - name: Generate pnpm lockfiles
        shell: bash
        run: |
          mapfile -t yarn_locks < <(find . -type f -name yarn.lock -not -path './.git/*' | sort)
          for lockfile in "${yarn_locks[@]}"; do
            directory="$(dirname "${lockfile}")"
            if [[ -f "${directory}/package.json" ]]; then
              (
                cd "${directory}"
                pnpm import || true
                pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts
              )
            fi
          done

          find . -type f -name yarn.lock -not -path './.git/*' -delete
          find . -type f -name .yarnrc.yml -not -path './.git/*' -delete
          find . -type f \( -name .pnp.cjs -o -name .pnp.js \) -not -path './.git/*' -delete
          find . -type d -name .yarn -not -path './.git/*' -prune -exec rm -rf {} +

          pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Commit migrated workflow
        shell: bash
        run: |
          rm -f .github/workflows/agent-pnpm-migrate.yml
          rm -f .github/scripts/migrate-pnpm.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No migration changes were produced."
            exit 1
          fi
          git commit -m "chore: migrate workflow from yarn to pnpm"
          git push origin HEAD
